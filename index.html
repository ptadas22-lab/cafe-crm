<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<!-- ✅ FIXED VIEWPORT -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Lassi Magic — Digital Menu</title>

<!-- ✅ PWA FEEL -->
<meta name="theme-color" content="#c8f135">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet"/>

<style>

/* ✅ GLOBAL FIXES */
html{
  font-size: clamp(14px, 2.5vw, 18px);
}

body{
  margin:0;
  font-family:'Nunito',sans-serif;
  background:#0a0e06;
  color:#f0f4e0;
  overflow-x:hidden;
  padding-bottom: env(safe-area-inset-bottom);
  overscroll-behavior:none;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px 20px;
}

.hero h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(60px,12vw,140px);
  margin:0;
}

.hero span{
  color:#c8f135;
}

/* NAV */
.nav{
  display:flex;
  overflow-x:auto;
  border-bottom:1px solid rgba(255,255,255,.1);
}

.nav button{
  flex-shrink:0;
  padding:12px 16px;
  background:none;
  border:none;
  color:#aaa;
  cursor:pointer;
}

.nav button.active{
  color:#c8f135;
}

/* SEARCH */
.search{
  padding:20px;
}

.search input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
}

/* GRID FIX */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
  padding:20px;
}

/* CARD */
.card{
  background:#1a2010;
  padding:14px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.card button{
  width:40px;
  height:40px;
  border-radius:50%;
  border:none;
  background:#c8f135;
  cursor:pointer;
}

/* CART */
.cart{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#c8f135;
  padding:12px 20px;
  border-radius:30px;
  display:none;
}

/* MOBILE OPTIMIZATION */
@media(max-width:600px){
  .hero h1{
    font-size:80px;
  }
}

</style>
</head>

<body>

<div class="hero">
  <h1>Lassi <span>Magic</span></h1>
</div>

<div class="nav" id="nav"></div>

<div class="search">
  <input type="text" placeholder="Search..." oninput="search(this.value)">
</div>

<div id="menu"></div>

<div class="cart" id="cart">Cart ₹0</div>

<script>

const MENU = [
  {name:"Sweet Lassi",price:50},
  {name:"Mango Lassi",price:70},
  {name:"Rose Falooda",price:80},
  {name:"Chocolate Shake",price:120},
  {name:"Cold Coffee",price:100},
  {name:"Pizza",price:120}
];

let cartTotal = 0;

/* BUILD MENU */
function loadMenu(){
  const menu = document.getElementById('menu');
  menu.className = "grid";

  MENU.forEach(item=>{
    const div = document.createElement('div');
    div.className = "card";
    div.innerHTML = `
      <span>${item.name}</span>
      <div>
        ₹${item.price}
        <button onclick="add(${item.price})">+</button>
      </div>
    `;
    menu.appendChild(div);
  });
}

/* ADD TO CART */
function add(price){
  cartTotal += price;
  const cart = document.getElementById('cart');
  cart.style.display = "block";
  cart.innerText = "Cart ₹" + cartTotal;
}

/* SEARCH */
function search(q){
  q = q.toLowerCase();
  document.querySelectorAll('.card').forEach(c=>{
    c.style.display = c.innerText.toLowerCase().includes(q) ? '' : 'none';
  });
}

loadMenu();

</script>

</body>
</html>
