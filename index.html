<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<!-- ✅ UNIVERSAL VIEWPORT (iPhone + Android + Notch Support) -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>

<title>Lassi Magic — Digital Menu</title>

<!-- ✅ PWA FEEL -->
<meta name="theme-color" content="#c8f135">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet"/>

<style>

/* ✅ GLOBAL RESET */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

html{
  font-size: clamp(14px, 2.5vw, 18px);
  scroll-behavior:smooth;
}

body{
  font-family:'Nunito',sans-serif;
  background:#0a0e06;
  color:#f0f4e0;
  overflow-x:hidden;

  /* ✅ SAFE AREA FIX */
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);

  overscroll-behavior-y:none;
}

/* HERO */
.hero{
  text-align:center;
  padding:50px 20px 30px;
}

.hero-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(60px,14vw,150px);
  line-height:.9;
}

.hero-title span{color:#c8f135;}

.hero-sub{
  color:#a0b060;
  margin-top:10px;
  font-size:14px;
}

/* NAV */
.nav-wrap{
  position:sticky;
  top:0;
  background:#0a0e06;
  z-index:100;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.nav{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.nav button{
  flex-shrink:0;
  padding:14px 18px;
  border:none;
  background:none;
  color:#777;
  font-weight:600;
  cursor:pointer;
  scroll-snap-align:center;
}

.nav button.active{
  color:#c8f135;
}

/* SEARCH */
.search{
  padding:20px;
}

.search input{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.1);
  background:#1a2010;
  color:#fff;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:12px;
  padding:20px;
}

/* CARD */
.card{
  background:#1a2010;
  border-radius:12px;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:.2s;
}

.card:hover{
  transform:translateY(-2px);
}

.price{
  color:#c8f135;
  font-weight:700;
}

/* BUTTON */
.add-btn{
  width:44px;
  height:44px;
  border-radius:50%;
  border:none;
  background:#c8f135;
  color:#000;
  font-size:18px;
  cursor:pointer;
}

/* CART */
.cart{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#c8f135;
  color:#000;
  padding:14px 26px;
  border-radius:40px;
  font-weight:700;
  display:none;
}

/* PERFORMANCE FIX */
@media (max-width:600px){
  .hero-title{
    font-size:80px;
  }
}

/* LANDSCAPE FIX */
@media (orientation:landscape) and (max-height:500px){
  .hero{
    padding:20px;
  }
  .hero-title{
    font-size:60px;
  }
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-title">Lassi <span>Magic</span></div>
  <div class="hero-sub">Fresh & Natural Café</div>
</div>

<!-- NAV -->
<div class="nav-wrap">
  <div class="nav" id="nav"></div>
</div>

<!-- SEARCH -->
<div class="search">
  <input type="text" placeholder="Search..." oninput="searchMenu(this.value)">
</div>

<!-- MENU -->
<div id="menu"></div>

<!-- CART -->
<div class="cart" id="cart">Cart ₹0</div>

<script>

/* MENU DATA */
const MENU = [
  {cat:"Lassi",items:[
    {name:"Sweet Lassi",price:50},
    {name:"Mango Lassi",price:70}
  ]},
  {cat:"Falooda",items:[
    {name:"Rose Falooda",price:80},
    {name:"Royal Falooda",price:115}
  ]},
  {cat:"Shakes",items:[
    {name:"Chocolate Shake",price:120},
    {name:"KitKat Shake",price:140}
  ]},
  {cat:"Coffee",items:[
    {name:"Cold Coffee",price:100},
    {name:"Caramel Coffee",price:120}
  ]}
];

let total = 0;

/* BUILD MENU */
function buildMenu(){
  const root = document.getElementById("menu");
  const nav = document.getElementById("nav");

  MENU.forEach((sec,i)=>{

    // nav
    const btn = document.createElement("button");
    btn.innerText = sec.cat;
    btn.onclick = ()=>document.getElementById("sec"+i).scrollIntoView({behavior:"smooth"});
    nav.appendChild(btn);

    // section
    const section = document.createElement("div");
    section.id = "sec"+i;

    const title = document.createElement("h2");
    title.style.padding="20px";
    title.innerText = sec.cat;

    const grid = document.createElement("div");
    grid.className = "grid";

    sec.items.forEach(item=>{
      const card = document.createElement("div");
      card.className="card";

      card.innerHTML = `
        <div>${item.name}<br><span class="price">₹${item.price}</span></div>
        <button class="add-btn">+</button>
      `;

      card.querySelector("button").onclick=()=>{
        total += item.price;
        updateCart();
      };

      grid.appendChild(card);
    });

    section.appendChild(title);
    section.appendChild(grid);
    root.appendChild(section);

  });
}

/* CART */
function updateCart(){
  const cart = document.getElementById("cart");
  cart.style.display="block";
  cart.innerText="Cart ₹"+total;
}

/* SEARCH */
function searchMenu(q){
  q=q.toLowerCase();
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display = c.innerText.toLowerCase().includes(q) ? "" : "none";
  });
}

buildMenu();

</script>

</body>
</html>
